    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" /></noscript>
    <!-- Per-page meta tags (title, description, Open Graph, JSON-LD) are managed with react-helmet-async in page components -->

    <!-- Theme init to prevent flash of wrong theme -->
    <script>
      (function(){
        try {
          var isDark = false;
          var stored = localStorage.getItem('theme');
          if (stored === 'dark') {
            isDark = true;
            document.documentElement.classList.add('dark');
          } else if (stored === 'light') {
            isDark = false;
            document.documentElement.classList.remove('dark');
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            isDark = true;
            document.documentElement.classList.add('dark');
          }
          var meta = document.createElement('meta');
          meta.name = 'theme-color';
          meta.content = isDark ? '#0B1E2D' : '#22b8a0';
          document.head.appendChild(meta);
        } catch (e) {}
      })();
    </script>
